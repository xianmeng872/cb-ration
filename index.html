<style>
  :root{

    --primary:#f97316; --primary2:#fb923c; --primary-light:#fff4ea;
    --red:#ea580c; --green:#9ca3af; --yellow:#f59e0b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  .hero{background:#ffffff;color:var(--ink);padding:18px 16px 14px;border-bottom:3px solid var(--primary)}
  .hero h1{margin:0 0 3px;font-size:19px;font-weight:800;letter-spacing:.5px;color:var(--ink)}
  .hero .sub{color:var(--muted);font-size:12px}
  .hero .bar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;flex-wrap:wrap}
  .hero .time{font-size:11.5px;background:#f5f5f7;color:var(--muted);padding:5px 10px;border-radius:18px}
  .btn{cursor:pointer;border:1px solid var(--primary);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;background:#fff;color:var(--primary);transition:.15s}
  .btn:active{transform:scale(.96)}
  .btn[disabled]{opacity:.6;cursor:default}
  .wrap{max-width:960px;margin:0 auto;padding:0 12px 60px}
  .tabs{display:flex;gap:8px;padding:12px 0 8px}
  .tab{flex:1;cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px;text-align:center;font-size:13.5px;font-weight:700;color:var(--muted)}
  .tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .search{padding:4px 0 10px}
  .search input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14px;background:var(--card);outline:none}
  .search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(249,115,22,.16)}
  .chips{display:flex;gap:7px;padding:4px 0 10px;flex-wrap:wrap}
  .chip{cursor:pointer;font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:18px;background:var(--card);border:1px solid var(--line);color:var(--muted)}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
  table{width:100%;border-collapse:collapse}
  thead th{background:#f8f9fb;color:#6b7280;font-size:12px;font-weight:700;text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;transition:.15s}
  thead th:hover{background:#f3f4f6;color:var(--primary)}
  thead th .sort-arrow{margin-left:4px;font-size:10px;opacity:.4}
  thead th .sort-arrow.active{opacity:1;color:var(--primary)}
  tbody td{padding:10px;vertical-align:middle;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.clickable{cursor:pointer}
  @media(hover:hover){ tbody tr.clickable:hover{background:var(--primary-light)} }
  .name{font-weight:800}
  .code{color:var(--muted);font-size:12px;margin-top:2px}
  .num{font-variant-numeric:tabular-nums;font-weight:700}
  .hl{color:var(--primary);font-weight:800}
  .muted{color:var(--muted)}
  .tag{display:inline-block;line-height:1.15;padding:3px 8px;white-space:nowrap;letter-spacing:.3px}
  /* 同意注册：实橙白字，最大最粗——离申购最近，最关键 */
  .tag-s90{background:var(--primary);color:#fff;font-weight:800;font-size:12.5px;box-shadow:0 1px 3px rgba(249,115,22,.28)}
  /* 已排期申购：深橙实底白字，最强 */
  .tag-sbuy{background:#ea580c;color:#fff;font-weight:800;font-size:12.5px}
  /* 上市委通过：橙描边橙字，加粗 */
  .tag-s80{background:#fff;color:var(--primary);font-weight:700;font-size:12px;border:1.5px solid var(--primary)}
  /* 交易所受理：浅橙底橙字，中等 */
  .tag-s50{background:var(--primary-light);color:#ea580c;font-weight:600;font-size:11.5px}
  /* 股东大会通过：灰底灰字 */
  .tag-s20{background:#f3f4f6;color:#6b7280;font-weight:600;font-size:11.5px}
  /* 董事会预案：灰描边浅字，最弱 */
  .tag-s10{background:#fff;color:#a1a1aa;font-weight:500;font-size:11px;border:1px solid #e5e7eb}
  /* 待发行（待发债Tab，未到申购日） */
  .tag-slist{background:#fff;color:var(--primary);font-weight:700;font-size:12px;border:1.5px solid var(--primary)}
  .empty{text-align:center;color:var(--muted);padding:36px 0}
  .foot{text-align:center;color:var(--muted);font-size:11px;line-height:1.7;padding:16px 8px}
  .foot b{color:var(--ink)}
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
  .mask.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:440px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .mh{position:sticky;top:0;background:var(--primary);color:#fff;padding:15px 18px;display:flex;justify-content:space-between;align-items:center}
  .modal .mh h3{margin:0;font-size:16px}
  .modal .mh .x{cursor:pointer;font-size:22px;line-height:1;opacity:.9}
  .modal .mb{padding:8px 18px 18px}
  .mrow{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .mrow:last-child{border-bottom:none}
  .mrow .k{color:var(--muted);flex:0 0 40%}
  .mrow .v{color:var(--ink);text-align:right;font-weight:700;word-break:break-all}
  .toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:#9a3412;color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;opacity:0;transition:.25s;z-index:99;max-width:360px;text-align:center;line-height:1.4}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ===== 手机适配：≤720px 卡片式列表（参考"小鱼的钱钱助手"风格） ===== */
  @media(max-width:720px){
    body{font-size:15px;-webkit-text-size-adjust:100%;background:#f5f5f7}
    .hero{padding:16px 14px 12px}
    .hero h1{font-size:18px}
    .wrap{padding:0 10px 72px}
    .tabs{padding:10px 0 6px}
    .tab{padding:12px 8px;font-size:14px}
    .search input{padding:13px 14px;font-size:16px}
    .chip{padding:8px 14px;font-size:13px}
    /* 隐藏表格，改用卡片 */
    .card{border-radius:14px;margin-bottom:12px;overflow:visible;border:1px solid #e5e7eb;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card table,.card thead,.card tbody,.card tr,.card th,.card td{display:none !important}
    /* 卡片列表容器 */
    .cb-list{display:flex;flex-direction:column;gap:10px}
    .cb-item{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 14px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s;-webkit-tap-highlight-color:rgba(249,115,22,.08)}
    .cb-item:active{transform:scale(.985);box-shadow:0 1px 6px rgba(0,0,0,.1)}
    /* 第一行：名称+代码（蓝色系） */
    .cb-name{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
    .cb-name .n{font-size:16px;font-weight:800;color:#2563eb;line-height:1.2}
    .cb-name .c{font-size:12px;color:#6b7280;font-weight:600;flex-shrink:0;margin-left:8px}
    /* 第二行：正股信息 */
    .cb-stock{font-size:12px;color:#9ca3af;margin-bottom:8px}
    /* 数据行：两列网格 */
    .cb-row{display:flex;flex-wrap:wrap;gap:4px 16px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px;align-items:baseline}
    .cb-row:last-child{border-bottom:none;padding-bottom:0}
    .cb-cell{display:inline-flex;align-items:baseline;gap:3px;min-width:42%}
    .cb-lbl{color:#9ca3af;font-size:12px;font-weight:500;white-space:nowrap}
    .cb-val{color:#1f2937;font-weight:700;font-variant-numeric:tabular-nums}
    .cb-val.hl{color:#ea580c;font-weight:800;font-size:14.5px}/* 橙色高亮：配售/资金 */
    .cb-val.blue{color:#2563eb;font-weight:700}/* 蓝色：名称类 */
    /* 底部辅助行（日期/规模/含权）更淡 */
    .cb-meta{color:#9ca3af;font-size:12px;display:flex;gap:12px;flex-wrap:wrap;padding-top:6px}
    .cb-meta span{font-weight:600}
    /* 状态标签内联 */
    .cb-tag{display:inline-flex;align-items:center;margin-left:4px;vertical-align:middle}
    /* 详情弹窗全屏化 */
    .mask{padding:0}
    .modal{max-width:none;width:100%;max-height:100vh;height:100%;border-radius:0}
    .modal .mh{padding:18px 16px}
    .modal .mh h3{font-size:17px}
    .modal .mb{padding:8px 14px 28px}
    .mrow{font-size:14px;padding:12px 0}
    /* 排序提示条（手机端卡片模式） */
    .sort-bar{display:flex;gap:6px;padding:6px 0 10px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .sort-btn{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:16px;background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;white-space:nowrap;cursor:pointer;transition:.15s;flex-shrink:0}
    .sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .foot{padding:20px 8px 30px}
  }
  /* 超小屏(≤380px)再收紧一点 */
  @media(max-width:380px){
    .tab{font-size:13px;padding:11px 6px}
    .chip{padding:7px 11px;font-size:12px}
    .cb-name .n{font-size:15px}
    .cb-val.hl{font-size:13.5px}
    .cb-row{font-size:12.5px}
  }
</style>
</head>

// 东财列表 -> 待发(空上市日) 且 申购日>=今天
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
async function fetchList(){
  const j=await (await fetch(EM_URL)).json();
  const all=(j.result&&j.result.data)||[];
  const t=todayStr();
  return all.filter(o=>!o.LISTING_DATE && (!o.PUBLIC_START_DATE || o.PUBLIC_START_DATE.slice(0,10)>=t)).map(o=>({
    code:o.SECURITY_CODE, name:o.SECURITY_NAME_ABBR,
    stockCode:o.CONVERT_STOCK_CODE, stockName:o.CONVERT_STOCK_NAME_ABBR||"",
    convertPrice:o.INITIAL_TRANSFER_PRICE, perPre:o.FIRST_PER_PREPLACING,
    scale:o.ACTUAL_ISSUE_SCALE, publicStart:o.PUBLIC_START_DATE||"", listDate:o.LISTING_DATE||"",
    stage:o.PUBLIC_START_DATE?"申购":"待发行"
  }));
}
// 腾讯实时价：用 <script> 注入方式(返回 v_xxxx="..." 全局变量)，绕过 file:// 跨域限制，本地双击也能刷新
function fetchPrice(stockCode){
  return new Promise((resolve)=>{
    const pre=stockCode[0]==="6"?"sh":"sz";
    const key="v_"+pre+stockCode;
    const s=document.createElement("script");
    let done=false;
    const finish=(raw)=>{
      if(done)return; done=true;
      try{s.remove();}catch(e){}
      if(raw){
        const f=raw.split("~");
        resolve({price:parseFloat(f[3]), name:f[1]||""});
      } else resolve(null);
    };
    s.onload=()=>finish(window[key]);
    s.onerror=()=>finish(null);
    s.src="https://qt.gtimg.cn/q="+pre+stockCode;
    document.body.appendChild(s);
    setTimeout(()=>finish(null), 6000);
  });
}
function compute(r,price){
  const cv=(price&&r.convertPrice)?price/r.convertPrice*100:null;
  const code=(r.stockCode||"");
  const isSH=code[0]==="6";  // 沪市(60/688开头)
  // 每股配售额：优先用真实值，否则用 apply10 反推(apply10=配售10张所需股数≈1000/每股配售)
  const perPre=(r.perPre&&r.perPre>0)?r.perPre:(r.apply10?1000/r.apply10:null);
  const baiyuan=(price&&perPre)?perPre*100/price:null;
  let needShares=null, needSharesSafe=null;
  if(r.apply10&&r.apply10>0) needSharesSafe=r.apply10;
  else if(perPre) needSharesSafe=Math.ceil(1000/perPre);
  if(perPre&&perPre>0){
    if(isSH){
      // 沪市一手党(搏1手)：获配额≥500元即大概率进位到1手(精确算法捡漏)，持股取整到100股
      let s=Math.ceil(500/perPre);
      s=Math.ceil(s/100)*100;
      needShares=s;
    } else {
      // 深市按张精确配售、无进位捡漏，1手=10张=1000元=needSharesSafe
      needShares=needSharesSafe;
    }
  } else if(r.apply10&&r.apply10>0){
    needShares=r.apply10;
  }
  const needMoney=(needShares&&price)?needShares*price:null;
  const needMoneySafe=(needSharesSafe&&price)?needSharesSafe*price:null;
  // estFloat 由服务端按"总规模×(1−受限主体锁定比例)"算好，存于 r._c.estFloat；此处直接读取，不再用固定比例估算
  const estFloat=(r._c&&r._c.estFloat!=null)?r._c.estFloat:null;
  return {cv,needShares,needSharesSafe,needMoney,needMoneySafe,baiyuan,price,market:isSH?"沪":"深",isSH,estFloat};
}
function fmt(v,d=2){return v==null?"待公告":(typeof v==="number"?v.toFixed(d):v);}
function arrow(dir){return '<span class="sort-arrow'+(dir?' active':'')+'">'+(dir===1?'▲':(dir===-1?'↓':'⇅'))+'</span>';}
function getVal(r,f){
  const c=r._c||{};
  if(f==="publicStart") return r.publicStart||"";
  if(f==="cv") return c.cv!=null?c.cv:-999;
  if(f==="baiyuan") return c.baiyuan!=null?c.baiyuan:-999;
  if(f==="scale") return r.scale||0;
  if(f==="estFloat") { const c=r._c||{}; return c.estFloat!=null?c.estFloat:-999; }
  if(f==="needMoney") return c.needMoney!=null?c.needMoney:999999;
  if(f==="progress") return Number(r.progress)||0;
  if(f==="name") return (r.name||r.stockName||"");
  if(f==="stockName") return r.stockName||"";
  return "";
}
function doSort(rows,sort){
  if(!sort.field) return rows;
  return rows.slice().sort((a,b)=>{
    let va=getVal(a,sort.field), vb=getVal(b,sort.field);
    if(typeof va==="string"&&typeof vb==="string"){const cmp=va.localeCompare(vb);return sort.dir*cmp;}
    if(typeof va==="number"&&typeof vb==="number"){return sort.dir*(va-vb);}
    return 0;
  });
}

function progressLabel(r){
  if(r.progress==="90") return (r.progress_nm&&r.progress_nm.indexOf("申购")>=0)?"已排期申购":"同意注册";
  if(r.progress==="80") return "上市委通过";
  if(r.progress==="50") return "交易所受理";
  if(r.progress==="20") return "股东大会通过";
  if(r.progress==="10") return "董事会预案";
  return (r.progress_nm||"其他").replace(/<br>/g," ");
}

      renderProgress();

    return;
  }

  // ===== PC端：表格 =====
  let h='<div class="card"><table><thead><tr>';
  h+='<th>正股 / 转债</th>';
  h+='<th>进度</th>';
  h+='<th>转股价</th><th data-sf="cv">转股价值 '+(ps.field==="cv"?arrow(ps.dir):'')+'</th>';
  h+='<th>一手党</th>';
  h+='<th data-sf="needMoney">所需资金 '+(ps.field==="needMoney"?arrow(ps.dir):'')+'</th>';
  h+='<th data-sf="baiyuan">百元含权 '+(ps.field==="baiyuan"?arrow(ps.dir):'')+'</th>';
  h+='<th data-sf="scale">规模(亿) '+(ps.field==="scale"?arrow(ps.dir):'')+'</th>';
  h+='<th data-sf="estFloat">预估流通(亿) '+(ps.field==="estFloat"?arrow(ps.dir):'')+'</th>';
  h+='</tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const c=r._c||{};
    const tagCls="tag-s"+r.progress;
    const mkt=c.market||"";
    const mktTag=mkt?'<span style="font-size:10px;background:'+(mkt==="沪"?"#fff4ea;color:#ea580c":"#f3f4f6;color:#6b7280")+';padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px">'+mkt+'</span>':"";
    h+='<tr class="clickable" data-i="'+i+'" data-kind="progress">';
    h+='<td data-label="正股/转债"><div class="name">'+(r.stockName||"-")+mktTag+'</div><div class="code">'+(r.stockCode||"")+(r.name?(" · "+r.name):"")+'</div></td>';
    h+='<td data-label="进度"><span class="tag '+tagCls+'">'+progressLabel(r)+'</span></td>';
    h+='<td data-label="转股价"><span class="num">'+fmt(r.convertPrice)+'</span></td>';
    h+='<td data-label="转股价值"><span class="hl num">'+(c.cv!=null?fmt(c.cv):"…")+'</span></td>';
    const shLabel2=(c.isSH&&c.needShares!=null)?(c.needShares+'股(搏)'):(c.needShares!=null?c.needShares+'股':'-');
    h+='<td data-label="一手党">'+(c.needShares!=null?('<span class="hl num">'+shLabel2+'</span>'+(c.isSH&&c.needSharesSafe!=null?'<br><span class="muted" style="font-size:11px">稳配'+c.needSharesSafe+'股</span>':'')):'<span class="muted">-</span>')+'</td>';
    h+='<td data-label="所需资金">'+(c.needMoney!=null?('<span class="hl num">'+fmt(c.needMoney,0)+'元</span>'+(c.isSH&&c.needMoneySafe!=null?'<br><span class="muted" style="font-size:11px">稳'+fmt(c.needMoneySafe,0)+'元</span>':'')):'<span class="muted">-</span>')+'</td>';
    h+='<td data-label="百元含权"><span class="hl num">'+(c.baiyuan!=null?fmt(c.baiyuan):"…")+'</span></td>';
    h+='<td data-label="规模"><span class="hl num">'+fmt(r.scale)+'</span></td>';
    h+='<td data-label="预估流通"><span class="hl num">'+(c.estFloat!=null?c.estFloat:'-')+'<span class="muted" style="font-size:10px;font-weight:400"> 预</span></span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  p.innerHTML=h;
  p.querySelectorAll("tr.clickable").forEach(tr=>tr.onclick=()=>openDetail(rows[+tr.dataset.i],"progress"));
  p.querySelectorAll("thead th[data-sf]").forEach(th=>th.onclick=()=>{
    const f=th.dataset.sf;
    progSort={field:f, dir:progSort.field===f?-progSort.dir:1};
    renderProgress();
  });
}
function openDetail(r,kind){
  const title=(kind==="progress"?(r.stockName||r.name||""):(kind==="pend"?(r.name||""):(r.stockName||"")))+"（"+(r.code||r.stockCode||"")+"）";
  $("#mtitle").textContent=title;
  const c=r._c||{};
  let rows=[];
  if(kind==="progress"){
    rows=[["stockCode",r.stockCode],["stockName",r.stockName],["name",r.name],["code",r.code],
      ["progress_nm",progressLabel(r)],["convertPrice",r.convertPrice],["price",c.price],
      ["cv",c.cv],["perPre",r.perPre],["一手党(搏)",c.needShares!=null?c.needShares+"股":"-"],
      ["稳配1手",(c.isSH&&c.needSharesSafe!=null)?c.needSharesSafe+"股":"-"],
      ["所需资金(搏)",c.needMoney!=null?fmt(c.needMoney,0)+"元":"-"],
      ["所需资金(稳)",(c.isSH&&c.needMoneySafe!=null)?fmt(c.needMoneySafe,0)+"元":"-"],
      ["scale",r.scale],["baiyuan",c.baiyuan],["progress_full",r.progress_full]];
  } else {
    rows=[["code",r.code],["name",r.name],["stockCode",r.stockCode],["stockName",r.stockName],
      ["convertPrice",r.convertPrice],["price",c.price],["cv",c.cv],["perPre",r.perPre],
      ["一手党(搏)",c.needShares!=null?c.needShares+"股":"-"],
      ["稳配1手",(c.isSH&&c.needSharesSafe!=null)?c.needSharesSafe+"股":"-"],
      ["所需资金(搏)",c.needMoney!=null?fmt(c.needMoney,0)+"元":"-"],
      ["所需资金(稳)",(c.isSH&&c.needMoneySafe!=null)?fmt(c.needMoneySafe,0)+"元":"-"],
      ["scale",r.scale],["publicStart",r.publicStart],["stage",r.stage],["baiyuan",c.baiyuan],["listDate",r.listDate]];
  }
  let h="";
  rows.forEach(([k,v])=>{if(v==null||v==="")return;let val=v;
    if(k==="cv"||k==="baiyuan"||k==="price")val=fmt(v);
    if(k==="needMoney"&&v!=null)val=fmt(v,0);
    if(k==="scale"&&v!=null)val=fmt(v)+"亿";
    if(k==="perPre"&&v!=null)val=fmt(v)+"元";
    if(k==="apply10"&&v!=null)val=fmt(v)+"股";
    if(k==="progress_full"){h+='<div class="mrow"><div class="k">审批流程</div><div class="v" style="white-space:pre-line;text-align:left;font-weight:600">'+val+'</div></div>';return;}
    h+='<div class="mrow"><div class="k">'+(LABEL[k]||k)+'</div><div class="v">'+val+'</div></div>';
  });
  $("#mbody").innerHTML=h||'<div class="empty">无字段</div>';
  $("#mask").classList.add("show");
}
async function loadAll(){
  const btn=$("#refresh");btn.disabled=true;btn.textContent="刷新中…";
  try{
    let emList=[];
    try{ emList=await fetchList(); }catch(e){ console.warn("东财列表拉取失败(用快照):",e.message); }
    const emMap={}; emList.forEach(o=>emMap[o.code]=o);
    let merged=SNAPSHOT_PEND.map(base=>{ const e=emMap[base.code]; return e?{...base,...e,_c:null}:{...base}; });
    emList.forEach(o=>{ if(!SNAPSHOT_PEND.find(b=>b.code===o.code)) merged.push(o); });
    PEND=merged;
    // 价格刷新(腾讯<script>注入，file:// 可用)；东财列表失败也不影响实时价
    await Promise.all(PEND.map(async r=>{try{const q=await fetchPrice(r.stockCode);if(q){if(!r.stockName)r.stockName=q.name;r._c=compute(r,q.price);}}catch(e){r._c=r._c||{};}}));
    renderPend();
    setTime("待发债实时");
    const hit=PEND.filter(r=>r._c&&r._c.cv!=null).length;
    toast(hit>0?("✅ 待发债 "+PEND.length+" 只（"+hit+"/"+PEND.length+" 已刷新实时价）"):"⚠️ 实时价拉取失败，已用快照价");
  }catch(e){console.error("刷新失败(非致命)，使用快照数据:",e.message);}
  finally{btn.disabled=false;btn.textContent="↻ 刷新实时";}
}
async function loadProgressRealtime(){
  if(!PROGRESS.length){renderProgress();return;}
  const btn=$("#refresh");btn.disabled=true;btn.textContent="刷新中…";
  try{
    await Promise.all(PROGRESS.map(async r=>{try{const q=await fetchPrice(r.stockCode);if(q){if(!r.stockName&&q.name)r.stockName=q.name;if(q.price!=null&&r.convertPrice){r.price=q.price;r._c=compute(r,q.price);}}}catch(e){}}));
    renderProgress();
    setTime("审核进度实时");
    const shown=filterProgressRaw(PROGRESS);
    toast("✅ 审核进度 "+shown.length+" 只（已过滤上市/申购中，"+(shown.filter(r=>r._c&&r._c.cv!=null).length)+"/"+shown.length+" 命中实时价）");
  }catch(e){console.error("审核进度实时价刷新失败(非致命):",e.message);}
  finally{btn.disabled=false;btn.textContent="↻ 刷新实时";}
}

// 事件
$("#mx").onclick=()=>$("#mask").classList.remove("show");
$("#mask").onclick=e=>{if(e.target.id==="mask")$("#mask").classList.remove("show");};
$("#q").addEventListener("input",e=>{keyword=e.target.value.trim();renderPend();});
$("#q2").addEventListener("input",e=>{keyword2=e.target.value.trim();renderProgress();});
$("#refresh").onclick=()=>{ if(activeTab==="pend") loadAll(); else loadProgressRealtime(); };
$("#progChips").querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{
  PROG_FILTER=ch.dataset.f;
  $("#progChips").querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
  ch.classList.add("active");
  renderProgress();
});
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  activeTab=t.dataset.tab;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  $("#view-pend").style.display=activeTab==="pend"?"block":"none";
  $("#view-progress").style.display=activeTab==="progress"?"block":"none";
  if(activeTab==="progress") loadProgressRealtime();
});
// init: 先用快照价重算(离线也能显示正确的一手党/百元含权)，再实时覆盖
PEND=SNAPSHOT_PEND.map(r=>{ const cc=r._c; return {...r, _c: cc&&cc.price!=null?compute(r,cc.price):(cc||null)}; });
renderPend();
PROGRESS=SNAPSHOT_PROGRESS.map(r=>{ const cc=r._c; return {...r, _c: cc&&cc.price!=null?compute(r,cc.price):(cc||null)}; });
renderProgress();
loadAll();
loadProgressRealtime();
</script>
